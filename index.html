<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Health App">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect fill='%23378ADD' width='180' height='180' rx='40'/><text x='90' y='95' font-size='90' text-anchor='middle' dominant-baseline='middle'>❤️</text></svg>">
    <title>Health App</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif; 
            color: #333; 
            background: #f5f5f5; 
        }
        .container { max-width: 100%; padding: 0; }
        .header { 
            padding: 2rem 1.25rem; 
            background: #fff; 
            border-bottom: 0.5px solid #e0e0e0; 
            text-align: center; 
        }
        .header h1 { 
            font-size: 32px; 
            font-weight: 600; 
            margin-bottom: 0.5rem; 
        }
        .header p { 
            font-size: 14px; 
            color: #999; 
        }
        .dashboard { 
            padding: 1.5rem 1.25rem; 
            display: grid; 
            grid-template-columns: 1fr; 
            gap: 1rem; 
        }
        .card { 
            background: #fff; 
            border: 0.5px solid #e0e0e0; 
            border-radius: 16px; 
            padding: 1.5rem; 
            cursor: pointer; 
            transition: all 0.3s; 
            text-decoration: none; 
            color: inherit; 
            display: block; 
        }
        .card:active { 
            transform: scale(0.98); 
            background: #f9f9f9; 
        }
        .card-icon { 
            font-size: 48px; 
            margin-bottom: 1rem; 
        }
        .card-title { 
            font-size: 18px; 
            font-weight: 600; 
            margin-bottom: 0.5rem; 
        }
        .card-description { 
            font-size: 13px; 
            color: #999; 
            line-height: 1.5; 
        }
        .quick-stats { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 0.75rem; 
            margin-bottom: 1rem; 
        }
        .stat { 
            background: #f9f9f9; 
            padding: 0.75rem; 
            border-radius: 8px; 
            text-align: center; 
        }
        .stat-value { 
            font-size: 18px; 
            font-weight: 600; 
        }
        .stat-label { 
            font-size: 11px; 
            color: #999; 
            margin-top: 0.25rem; 
        }
        .footer { 
            padding: 2rem 1.25rem; 
            text-align: center; 
            color: #999; 
            font-size: 12px; 
        }
        .version { 
            color: #ccc; 
            font-size: 11px; 
            margin-top: 1rem; 
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Health</h1>
            <p id="dateDisplay">Lunes, 16 Jun 2026</p>
        </div>

        <div class="dashboard">
            <!-- NUTRITION CARD -->
            <a href="nutrition_tracker_1.html" class="card">
                <div class="card-icon">🥗</div>
                <div class="card-title">Nutrición</div>
                <div class="card-description">Track macros, calories, and micros for each meal</div>
                <div class="quick-stats" id="nutritionStats">
                    <div class="stat">
                        <div class="stat-value" id="todayCalories">0</div>
                        <div class="stat-label">cal</div>
                    </div>
                    <div class="stat">
                        <div class="stat-value" id="todayProtein">0g</div>
                        <div class="stat-label">protein</div>
                    </div>
                </div>
            </a>

            <!-- WEIGHT CARD -->
            <a href="nutrition_tracker_1.html#weight" class="card">
                <div class="card-icon">⚖️</div>
                <div class="card-title">Peso</div>
                <div class="card-description">Log weight and track progress over time</div>
                <div class="quick-stats" id="weightStats">
                    <div class="stat">
                        <div class="stat-value" id="latestWeight">--</div>
                        <div class="stat-label">kg</div>
                    </div>
                    <div class="stat">
                        <div class="stat-value" id="weightChange">--</div>
                        <div class="stat-label">change</div>
                    </div>
                </div>
            </a>

            <!-- MICROS CARD -->
            <a href="nutrition_tracker_1.html#micros" class="card">
                <div class="card-icon">💊</div>
                <div class="card-title">Micronutrientes</div>
                <div class="card-description">Monitor vitamins, minerals, and key nutrients</div>
                <div class="quick-stats" id="microsStats">
                    <div class="stat">
                        <div class="stat-value" id="microsTracked">0</div>
                        <div class="stat-label">tracked</div>
                    </div>
                    <div class="stat">
                        <div class="stat-value" id="microsPercentage">0%</div>
                        <div class="stat-label">avg</div>
                    </div>
                </div>
            </a>
        </div>

        <div class="footer">
            <p>Tap a card to get started</p>
            <div class="version">Health App v1.0</div>
        </div>
    </div>

    <script>
        function getDateKey(date) {
            return date.toISOString().split('T')[0];
        }

        function getFullDate(date) {
            const options = { weekday: 'long', year: 'numeric', month: 'short', day: 'numeric' };
            return date.toLocaleDateString('es-MX', options).replace(/^./, str => str.toUpperCase());
        }

        function loadDashboard() {
            const today = new Date();
            document.getElementById('dateDisplay').textContent = getFullDate(today);

            // Load nutrition data
            const nutritionData = localStorage.getItem('nutritionData');
            if (nutritionData) {
                const data = JSON.parse(nutritionData);
                const todayKey = getDateKey(today);
                const todayData = data[todayKey];

                if (todayData) {
                    let totalCals = 0;
                    let totalProtein = 0;

                    Object.values(todayData).forEach(meal => {
                        meal.forEach(plate => {
                            totalCals += plate.calories;
                            totalProtein += plate.protein;
                        });
                    });

                    document.getElementById('todayCalories').textContent = Math.round(totalCals);
                    document.getElementById('todayProtein').textContent = Math.round(totalProtein) + 'g';
                }
            }

            // Load weight data
            const weightData = localStorage.getItem('weightData');
            if (weightData) {
                const data = JSON.parse(weightData);
                const entries = Object.entries(data).sort((a, b) => new Date(b[0]) - new Date(a[0]));

                if (entries.length > 0) {
                    const latest = entries[0][1];
                    document.getElementById('latestWeight').textContent = latest.toFixed(1);

                    if (entries.length > 1) {
                        const previous = entries[1][1];
                        const change = (latest - previous).toFixed(1);
                        const sign = change > 0 ? '+' : '';
                        document.getElementById('weightChange').textContent = sign + change + 'kg';
                    }
                }
            }

            // Load micro goals
            const microGoals = localStorage.getItem('microGoals');
            if (microGoals) {
                const goals = JSON.parse(microGoals);
                const goalCount = Object.keys(goals).length;
                document.getElementById('microsTracked').textContent = goalCount;

                // Calculate average percentage (simplified)
                let avgPercentage = 0;
                // This would need full nutrition data to calculate properly
                document.getElementById('microsPercentage').textContent = '0%';
            }
        }

        loadDashboard();
    </script>
</body>
</html>
